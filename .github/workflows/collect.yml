name: collect

# 7 runs/day Central time: 7:00, 10:00, 13:00, 15:00, 18:00, 20:00, 22:00.
# GitHub cron is UTC and DST-unaware, so we schedule BOTH candidate UTC hours
# (CDT = UTC-5, CST = UTC-6) and the gate step exits unless the current
# Central hour is actually one of the seven targets. Correct year-round,
# no duplicate runs. Minute 7 avoids GitHub's congested top-of-hour delays.
on:
  schedule:
    - cron: '7 12,13,15,16,18,19,20,21,23 * * *'
    - cron: '7 0,1,2,3,4 * * *'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Gate on DATA FRESHNESS, not wall-clock hour. GitHub's scheduler drifts
      # (observed 2026-07-18: fires ~1h late), which made the old exact-hour
      # gate skip EVERY run — green jobs, no data. Asking the dashboard "how
      # old is the data?" is drift-immune and self-deduping: the enumerated
      # crons still converge to ~7 collections/day, and any failure to reach
      # /api/health fails OPEN (collect rather than silently starve).
      - name: Gate on data freshness
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run — no gate"
            echo "run=yes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGE=$(curl -fsS -m 20 "${{ secrets.DASHBOARD_URL }}/api/health" | jq -r '.ageHours // empty' 2>/dev/null || echo "")
          echo "data age: ${AGE:-unknown}h"
          if [ -n "$AGE" ] && awk "BEGIN{exit !($AGE < 1.25)}"; then
            echo "data is fresh — skipping (cron-drift dedupe)"
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.run == 'yes'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'yes'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.gate.outputs.run == 'yes'
        run: npx playwright install --with-deps chromium

      - name: Collect and push to dashboard
        if: steps.gate.outputs.run == 'yes'
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          NWS_USER_AGENT: ${{ secrets.NWS_USER_AGENT }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          RATE_URL_REDROOF: ${{ secrets.RATE_URL_REDROOF }}
          RATE_URL_EXPEDIA: ${{ secrets.RATE_URL_EXPEDIA }}
          RATE_URL_BOOKING: ${{ secrets.RATE_URL_BOOKING }}
          GOOGLE_HOTELS_QUERY: ${{ secrets.GOOGLE_HOTELS_QUERY }}
        run: npm run collect
