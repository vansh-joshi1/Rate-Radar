name: health-watchdog

# Daily dead-pipeline check. The collector job "succeeding" doesn't prove data
# is flowing (and a disabled cron can't report itself) — this asks the deployed
# dashboard when data last arrived. /api/health returns 503 if no snapshot
# landed in 24h, failing this job, and GitHub emails the repo owner on failure.
on:
  schedule:
    - cron: '17 15 * * *' # ~9-10am Central year-round
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ask the dashboard when data last arrived
        run: |
          echo "Checking ${{ secrets.DASHBOARD_URL }}/api/health"
          RESPONSE=$(curl -fsS "${{ secrets.DASHBOARD_URL }}/api/health")
          echo "$RESPONSE"
